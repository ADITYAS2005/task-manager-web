[nixpacks]
providers = ["nodejs-pnpm"]

[nixpacks.env]
NIXPACKS_NODE_VERSION = "20"

[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npx serve -s dist -l $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
